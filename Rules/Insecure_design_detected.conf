index=* sourcetype=access_combined uri_path="/vulnerabilities/fi/"
| eval decoded_payload=urldecode(urldecode(uri_query))
| eval is_lfi=if(match(decoded_payload, "(?i)(\\.\\.[\\\\/]|\\.\\.\\.\\.|/etc/(passwd|shadow|issue|hosts|group)|win\\.ini|boot\\.ini|%00)"), 1, 0)
| eval is_wrappers=if(match(decoded_payload, "(?i)(?:php|zip|phar|data|expect)://"), 1, 0)
| eval is_rfi=if(match(decoded_payload, "(?i)page=(?:http|https|ftp|dict)://"), 1, 0)
| where is_lfi=1 OR is_wrappers=1 OR is_rfi=1
| stats count as attack_attempts values(decoded_payload) as sample_payloads by clientip, _time
| table _time clientip attack_attempts sample_payloads