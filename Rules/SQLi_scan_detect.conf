index=* sourcetype="access_combined" method IN ("GET", "POST")
| eval decoded_uri=urldecode(uri)
| regex decoded_uri="(?i)('|\x27|\%27|UNION\s+|SELECT\s+|OR\s+.*=|AND\s+.*=|--|#|SLEEP\(|BENCHMARK\()"
| eval uri_length=len(decoded_uri)
| bin _time span=5m
| stats count as total_sqli_reqs, 
        dc(decoded_uri) as unique_sqli_payloads, 
        avg(uri_length) as avg_payload_length,
        values(decoded_uri) as sample_payloads 
        by clientip, _time
| where total_sqli_reqs >= 5 AND unique_sqli_payloads >= 3
| table _time, clientip, total_sqli_reqs, unique_sqli_payloads, avg_payload_length, sample_payloads