index=* sourcetype=access_combined uri_path="/vulnerabilities/upload/"
| rex field=uri_query "(?i)upload_name=(?<uploaded_filename>[^&]+)"
| where isnotnull(uploaded_filename)
| eval decoded_filename=urldecode(uploaded_filename)
| eval is_dangerous_ext=if(match(decoded_filename, "(?i)\.(?:php\d?|phtml|shtml|asp|aspx|jsp|sh|pl|cgi|jar|war|doc|xls|pdf)$"), 1, 0)
| eval is_evasion=if(match(decoded_filename, "(?i)(\.(?:php|jsp|asp|sh)\.(?:jpg|png|gif|jpeg|txt)|\.(?:php|jsp|asp|sh)\s+$|%00|\\x00|\\\\x00)"), 1, 0)
| eval is_deserialization=if(match(decoded_filename, "(?i)(?:phar://|O:\d+:|script>alert)"), 1, 0)
| where is_dangerous_ext=1 OR is_evasion=1 OR is_deserialization=1
| stats count as upload_attempts values(decoded_filename) as targeted_files by clientip, _time
| table _time clientip upload_attempts targeted_files