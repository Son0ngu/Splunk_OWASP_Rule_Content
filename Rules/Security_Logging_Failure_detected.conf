index=* sourcetype=access_combined 
| eval raw_uri=uri
| eval decoded_uri=urldecode(uri)
| eval payload_length=len(raw_uri)
| eval is_crlf=if(match(raw_uri, "(?i)(%0D%0A|%0A%0D|%0A|%0D|\n|\r)"), 1, 0)
| eval is_viewer_xss=if(match(decoded_uri, "(?i)(<script|<img|javascript:|onerror=|\\\\x1b\[|\\\\033\[)"), 1, 0)
| eval is_buffer_bloat=if(payload_length > 1500 OR match(raw_uri, "(?i)(%00{10,}|%08{10,}|\x08{10,})"), 1, 0)
| where is_crlf=1 OR is_viewer_xss=1 OR is_buffer_bloat=1
| stats count as attack_attempts values(decoded_uri) as seen_payload_or_command max(payload_length) as max_bytes by clientip, _time
| table _time clientip attack_attempts max_bytes seen_payload_or_command