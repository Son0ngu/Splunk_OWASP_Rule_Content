index=* sourcetype=access_combined uri_path="/vulnerabilities/sqli/"
| rex field=uri_query "(?i)vuln_session=(?<sampled_session>[^&]+)"
| where isnotnull(sampled_session)
| bin _time span=5m
| eval decoded_session=urldecode(sampled_session)
| stats count as request_count dc(decoded_session) as unique_sessions values(decoded_session) as payload_list by clientip, _time
| eval joined_sessions=mvjoin(payload_list, ",")
| eval is_jwt_tampering=if(match(joined_sessions, "(?i)eyJhbGciOiJub25l"), 1, 0)
| where unique_sessions > 5 OR is_jwt_tampering=1
| table _time clientip request_count unique_sessions payload_list