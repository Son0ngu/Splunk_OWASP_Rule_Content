index=* sourcetype=access_combined uri_path="/vulnerabilities/brute/"
| rex field=uri "(?i)username=(?<target_user>[^&]+)"
| rex field=uri "(?i)password=(?<attempted_password>[^& ]+)"
| bin _time span=5m
| stats count as total_attempts, dc(attempted_password) as unique_passwords, values(target_user) as target_users, values(attempted_password) as sample_passwords by clientip, _time
| where total_attempts > 10 AND unique_passwords > 5
| table _time clientip target_users total_attempts unique_passwords sample_passwords