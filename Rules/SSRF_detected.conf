index=* sourcetype=access_combined uri_path="/vulnerabilities/fi/"
| rex field=uri_query "(?i)page=(?<ssrf_target>[^&]+)"
| where isnotnull(ssrf_target)
| eval decoded_target=urldecode(ssrf_target)
| eval is_cloud_metadata=if(match(decoded_target, "(?i)(169\.254\.169\.254|metadata\.google\.internal|metadata/instance)"), 1, 0)
| eval is_alt_protocol=if(match(decoded_target, "(?i)(gopher|dict|ftp|telnet|ldap|file)://"), 1, 0)
| eval is_internal_ip=if(match(decoded_target, "(?i)https?://(?:127\.|10\.|192\.168\.|172\.(?:1[6-9]|2[0-9]|3[0-1])\.|0\.0\.0\.0|localhost)"), 1, 0)
| eval is_evasion=if(match(decoded_target, "(?i)(?:2130706433|0177\.0|0x7f|\[::1\]| nip\.io|localtest\.me|\[0:0:0:0:0:ffff:127\.0\.0\.1\])"), 1, 0)
| where is_cloud_metadata=1 OR is_alt_protocol=1 OR is_internal_ip=1 OR is_evasion=1
| stats count as attack_attempts values(decoded_target) as targeted_urls by clientip, _time
| table _time clientip attack_attempts targeted_urls