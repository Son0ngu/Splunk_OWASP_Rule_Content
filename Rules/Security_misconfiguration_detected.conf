index=* sourcetype=access_combined
| bin _time span=5m
| eval target=uri_path
| eval is_admin=if(match(target, "(?i)/(admin/?|administrator/?|admin_login\.php|phpMyAdmin/?|pma/?|manager/html/?|jmx-console/?)"), 1, 0)
| eval is_info=if(match(target, "(?i)/(phpinfo\.php|info\.php|test\.php|server-status.*|server-info|debug/default/view|.*debug\.log)"), 1, 0)
| eval is_api=if(match(target, "(?i)/(actuator/.*|swagger-ui.*|api/docs|v2/api-docs|trace\.axd|elmah\.axd)"), 1, 0)
| eval is_artifact=if(match(target, "(?i)/(\.DS_Store|Thumbs\.db|\.idea|__pycache__)"), 1, 0)
| where is_admin=1 OR is_info=1 OR is_api=1 OR is_artifact=1
| stats count as scan_attempts values(status) as status_codes values(target) as seen_endpoints by clientip, _time
| eval is_successful=if(match(mvjoin(status_codes, ","), "200"), "YES", "NO")
| table _time clientip scan_attempts seen_endpoints status_codes