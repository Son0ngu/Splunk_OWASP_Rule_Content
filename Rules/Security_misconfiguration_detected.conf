| tstats summariesonly=true allow_old_summaries=true count from datamodel=Web.Web by Web.src, Web.uri_path, Web.status, _time span=5m
| rename Web.* as *
| regex uri_path="(?i)/(admin/?|administrator/?|admin_login\.php|phpMyAdmin/?|pma/?|manager/html/?|jmx-console/?|phpinfo\.php|info\.php|test\.php|server-status.*|server-info|debug/default/view|.*debug\.log|actuator/.*|swagger-ui.*|api/docs|v2/api-docs|trace\.axd|elmah\.axd|\.DS_Store|Thumbs\.db|\.idea|__pycache__)"
| stats sum(count) as scan_attempts values(status) as status_codes values(uri_path) as seen_endpoints by src, _time
| eval is_successful=if(match(mvjoin(status_codes, ","), "200"), "YES", "NO")
| rename src as clientip
| table _time clientip scan_attempts seen_endpoints status_codes is_successful