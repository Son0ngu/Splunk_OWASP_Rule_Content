index=* sourcetype=access_combined uri_path="/vulnerabilities/exec/"
| eval decoded_payload=urldecode(uri_query)
| eval is_injection=if(match(decoded_payload, "(?i)(?:;|\||\|\||&&|&|`|\\$|\\n|\\r).*(?:wget|curl|nc|netcat|awk|sed|php|python|perl|ruby|sh|bash|cmd|powershell|whoami|pwd|cat|id|ls|dir|type|ipconfig|ifconfig)"), 1, 0)
| eval is_evasion=if(match(decoded_payload, "(?i)(?:base64\\s*-d|\\$\\{IFS\\}|<\\s*\\/|>\\s*\\/|\\/dev\\/(?:tcp|udp)\\/|mkfifo|(?:\\w+\\\\)+\\w+|\\\\x\\w{2})"), 1, 0)
| where is_injection=1 OR is_evasion=1
| stats count as injection_attempts values(decoded_payload) as seen_payloads by clientip, _time
| table _time clientip injection_attempts seen_payloads