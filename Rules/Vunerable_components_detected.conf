| tstats summariesonly=true allow_old_summaries=true count from datamodel=Web.Web by Web.src, Web.http_user_agent, Web.uri_query, _time
| rename Web.* as *
| eval payload=urldecode(coalesce(http_user_agent, "")) . " | " . urldecode(coalesce(uri_query, ""))
| where match(payload, "(?i)(\\$\\{(?:jndi|lower|upper|script):|\\(\\)\\s*\\{\\s*[a-zA-Z_:]*;\\s*\\}|%\\{\\s*\\(|@ognl\\.|#_memberAccess|class\\.module\\.classLoader)")
| eval attack_type=case(match(payload, "(?i)\\$\\{(?:jndi|lower|upper|script):"), "Log4Shell / Text4Shell (CVE-2021-44228/CVE-2022-42889)", match(payload, "(?i)\\(\\)\\s*\\{\\s*[a-zA-Z_:]*;\\s*\\}"), "Shellshock (CVE-2014-6271)", match(payload, "(?i)(?:%\\{\\s*\\(|@ognl\\.|#_memberAccess)"), "Struts2 OGNL Injection", match(payload, "(?i)class\\.module\\.classLoader"), "Spring4Shell (CVE-2022-22965)")
| stats sum(count) as exploit_attempts values(http_user_agent) as injected_ua values(uri_query) as injected_uri values(attack_type) as attack_vectors by src, _time
| rename src as clientip
| table _time clientip attack_vectors exploit_attempts injected_ua injected_uri