index=* sourcetype=access_combined
| eval decoded_ua=urldecode(useragent)
| eval decoded_uri=urldecode(uri_query)
| eval combined_payload = decoded_ua . " | " . decoded_uri
| eval is_log4j=if(match(combined_payload, "(?i)\\$\\{(?:jndi|lower|upper|script):"), 1, 0)
| eval is_shellshock=if(match(combined_payload, "(?i)\\(\\)\\s*\\{\\s*[a-zA-Z_:]*;\\s*\\}"), 1, 0)
| eval is_struts=if(match(combined_payload, "(?i)(?:%\\{\\s*\\(|@ognl\\.|#_memberAccess)"), 1, 0)
| eval is_spring=if(match(combined_payload, "(?i)class\\.module\\.classLoader"), 1, 0)
| where is_log4j=1 OR is_shellshock=1 OR is_struts=1 OR is_spring=1
| eval attack_type=case(is_log4j==1, "Log4Shell / Text4Shell (CVE-2021-44228/CVE-2022-42889)", is_shellshock==1, "Shellshock (CVE-2014-6271)", is_struts==1, "Struts2 OGNL Injection", is_spring==1, "Spring4Shell (CVE-2022-22965)")
| stats count as exploit_attempts values(useragent) as injected_ua values(uri_query) as injected_uri values(attack_type) as attack_vectors by clientip, _time
| table _time clientip attack_vectors exploit_attempts injected_ua injected_uri